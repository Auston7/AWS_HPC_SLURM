name: Destroy Slurm Cluster

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region of the Slurm cluster
        required: true
        default: us-east-1
        type: string
      config_file:
        description: Path to config file in aws-eda-slurm-cluster repository
        required: true
        default: ./resources/config/default_config.yml
        type: string
      aws_eda_slurm_ref:
        description: Branch, tag, or commit in aws-samples/aws-eda-slurm-cluster
        required: true
        default: main
        type: string

jobs:
  aws-login:
    name: Validate AWS Authentication
    uses: ./.github/workflows/awsLogin.yml
    with:
      aws_region: ${{ inputs.aws_region }}

  destroy-slurm-cluster:
    name: Destroy Slurm Cluster
    runs-on: ubuntu-latest
    needs: aws-login

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AWS CDK
        shell: bash
        run: npm install -g aws-cdk@2.179.0

      - name: Clone aws-eda-slurm-cluster
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/aws-samples/aws-eda-slurm-cluster.git
          cd aws-eda-slurm-cluster
          git checkout "${{ inputs.aws_eda_slurm_ref }}"

      - name: Destroy Slurm Cluster
        shell: bash
        run: |
          set -euo pipefail
          cd aws-eda-slurm-cluster
          chmod +x setup.sh install.sh
          ./setup.sh
          ./install.sh --config-file "${{ inputs.config_file }}" --cdk-cmd destroy